<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a181f"/>
      <stop offset="1" stop-color="#100f14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#e07436" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#e07436" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#e07436" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.95" r="0.8">
      <stop offset="0" stop-color="#e07436" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e07436" stop-opacity="0"/>
    </radialGradient>

    <!-- faint fox face motif -->
    <g id="fox" fill="#e07436">
      <path d="M16 30 L4 0 L34 20 Z"/>
      <path d="M60 30 L72 0 L42 20 Z"/>
      <path d="M16 28 L8 56 L38 78 L68 56 L60 28 L38 38 Z"/>
    </g>
    <!-- sparkle motif -->
    <path id="spark" d="M0 -16 L4 -4 L16 0 L4 4 L0 16 L-4 4 L-16 0 L-4 -4 Z" fill="#e07436"/>
  </defs>

  <rect width="1600" height="1000" fill="url(#base)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect width="1600" height="1000" fill="url(#glow2)"/>

  <!-- scattered faint motifs -->
  <g opacity="0.05">
    <use href="#fox" x="120" y="140" transform="rotate(-12 158 178)"/>
    <use href="#fox" x="1280" y="640" transform="scale(1.6)" />
    <use href="#fox" x="380" y="760"/>
    <use href="#fox" x="980" y="120" transform="rotate(10 1018 158)"/>
  </g>
  <g opacity="0.08">
    <use href="#spark" x="300" y="300"/>
    <use href="#spark" x="1180" y="240" transform="scale(0.7)"/>
    <use href="#spark" x="760" y="820" transform="scale(1.3)"/>
    <use href="#spark" x="1420" y="520"/>
    <use href="#spark" x="180" y="620" transform="scale(0.8)"/>
  </g>
</svg>
