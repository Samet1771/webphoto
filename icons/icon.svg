<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- background -->
  <rect x="3" y="3" width="90" height="90" rx="20" fill="#fdeee4"/>

  <!-- ears (outer) -->
  <path d="M31 44 L20 9 L48 30 Z" fill="#e07436" stroke="#3b2417" stroke-width="2.6" stroke-linejoin="round"/>
  <path d="M65 44 L76 9 L48 30 Z" fill="#e07436" stroke="#3b2417" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- ear tips (dark) -->
  <path d="M20 9 L23.5 20 L28.5 15 Z" fill="#3b2417"/>
  <path d="M76 9 L72.5 20 L67.5 15 Z" fill="#3b2417"/>

  <!-- face -->
