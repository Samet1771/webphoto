  <!-- eyes -->
  <ellipse cx="39" cy="53" rx="2.9" ry="3.5" fill="#3b2417"/>
  <ellipse cx="57" cy="53" rx="2.9" ry="3.5" fill="#3b2417"/>
  <!-- nose -->
  <path d="M44.5 60 L51.5 60 L48 66 Z" fill="#3b2417" stroke="#3b2417" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- camera-flash sparkle -->
