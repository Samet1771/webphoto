<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>FullShot</title>
  </head>
  <body>
    <header>
      <img class="logo" src="icons/icon-48.png" alt="" width="28" height="28" />
      <h1>FullShot</h1>
    </header>

    <div class="actions">
      <button id="captureFull" class="primary">📸 Capture Full Page</button>
      <button id="captureVisible" class="secondary">Capture Visible Area</button>
    </div>

    <div id="progress" class="progress hidden">
      <div class="bar"><div id="barFill" class="bar-fill"></div></div>
      <div id="status" class="status">Working…</div>
    </div>

    <details class="options">
      <summary>Options</summary>

      <div class="opt-row">
        <label for="scrollArea">Scroll area</label>
        <select id="scrollArea">
          <option value="auto">Auto-detect</option>
          <option value="page">Whole page</option>
          <option value="element">Inner scroll area</option>
        </select>
      </div>

      <div class="opt-row">
        <label for="format">Format</label>
        <select id="format">
          <option value="png">PNG · lossless</option>
          <option value="jpeg">JPEG · smaller files</option>
        </select>
      </div>

      <div class="opt-row" id="qualityRow">
        <label for="quality">JPEG quality</label>
        <input type="range" id="quality" min="0.5" max="1" step="0.05" />
        <span id="qualityVal" class="val"></span>
      </div>

      <div class="opt-row">
        <label for="maxHeight">Split when taller than</label>
        <input type="number" id="maxHeight" min="2000" max="32000" step="1000" />
        <span class="unit">px</span>
      </div>

      <div class="opt-row">
        <label for="delay">Capture delay</label>
        <input type="number" id="delay" min="0" max="5000" step="50" />
        <span class="unit">ms</span>
      </div>

      <div class="opt-row check">
        <input type="checkbox" id="hideFixed" />
        <label for="hideFixed">Hide floating headers while scrolling</label>
      </div>
    </details>

    <footer>
      <span>Shortcut: <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>P</kbd></span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
